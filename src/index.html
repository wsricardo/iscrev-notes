<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iScrev Notes - Início</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { 
            font-family: 'Playfair Display', serif; 
            background-color: #f5efe0; 
            color: #1a1209; 
            text-align: center; 
            padding: 10vh 20px; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            box-sizing: border-box;
        }
        .hero { max-width: 600px; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; color: #c8843a; }
        .hero p { font-size: 1.25rem; line-height: 1.6; margin-bottom: 2rem; }
        .btn { 
            display: inline-block; 
            padding: 12px 30px; 
            background: #c8843a; 
            color: #fff; 
            text-decoration: none; 
            border-radius: 4px; 
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>iScrev Notes</h1>
        <p>O seu diário digital e caderno de anotações pessoal com suporte a Markdown, LaTeX e desenho manual. Simples, rápido e 100% focado no seu conteúdo.</p>
        <a href="diario.html" class="btn">Abrir Diário</a>
    </div>

</html>
